<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma Collection d'Émaux</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏺</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <h1>Ma Collection d'Émaux</h1>
      <span id="count-badge" class="count-badge"></span>
      <div class="header-spacer"></div>
      <div class="view-toggle" id="view-toggle">
        <button class="view-btn active" data-mode="detail" title="Vue détaillée">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <rect x="1.5" y="1.5" width="13" height="13" rx="2"/>
            <line x1="1.5" y1="6" x2="14.5" y2="6"/>
            <line x1="4.5" y1="9.5" x2="11.5" y2="9.5"/>
            <line x1="4.5" y1="12" x2="9.5" y2="12"/>
          </svg>
        </button>
        <button class="view-btn" data-mode="picture" title="Vue photos">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1.5" y="1.5" width="5.5" height="5.5" rx="1.5"/>
            <rect x="9" y="1.5" width="5.5" height="5.5" rx="1.5"/>
            <rect x="1.5" y="9" width="5.5" height="5.5" rx="1.5"/>
            <rect x="9" y="9" width="5.5" height="5.5" rx="1.5"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <div class="filters-bar">
    <div class="search-wrap">
      <input type="search" id="search-input" class="search-input" placeholder="Rechercher un émail…" autocomplete="off" spellcheck="false">
    </div>

    <div class="filter-group">
      <label>Marque</label>
      <div class="chips" id="filter-brand">
        <button class="chip active" data-value="all">Tout</button>
        <button class="chip" data-value="Brilliant Botz">Botz</button>
        <button class="chip" data-value="Cigale &amp; Fourmi">Cigale &amp; Fourmi</button>
        <button class="chip" data-value="Amaco">Amaco</button>
      </div>
    </div>

    <div class="filter-group">
      <label>Température</label>
      <div class="chips" id="filter-temp">
        <button class="chip active" data-value="all">Tout</button>
        <button class="chip" data-value="faience">Faïence &lt;1100°C</button>
        <button class="chip" data-value="gres">Grès ≥1200°C</button>
      </div>
    </div>

    <div class="filter-group">
      <label>Forme</label>
      <div class="chips" id="filter-form">
        <button class="chip active" data-value="all">Tout</button>
        <button class="chip" data-value="liquid">Liquide</button>
        <button class="chip" data-value="powder">Poudre</button>
      </div>
    </div>

    <div class="filter-group">
      <label>Couleur</label>
      <div class="chips" id="filter-color">
        <button class="chip active" data-value="all">Tout</button>
        <button class="chip color-chip" data-value="white" style="--swatch:#f2f2ee">Blanc</button>
        <button class="chip color-chip" data-value="pink" style="--swatch:#e8aabb">Rose</button>
        <button class="chip color-chip" data-value="red" style="--swatch:#cc2828">Rouge</button>
        <button class="chip color-chip" data-value="purple" style="--swatch:#b090c0">Mauve</button>
        <button class="chip color-chip" data-value="blue" style="--swatch:#1a3a8c">Bleu</button>
        <button class="chip color-chip" data-value="turquoise" style="--swatch:#2a9898">Turquoise</button>
        <button class="chip color-chip" data-value="green" style="--swatch:#1a7850">Vert</button>
        <button class="chip color-chip" data-value="gold" style="--swatch:#c8a830">Or</button>
        <button class="chip color-chip" data-value="brown" style="--swatch:#6a5030">Brun</button>
        <button class="chip color-chip" data-value="gray" style="--swatch:#909090">Gris</button>
        <button class="chip color-chip" data-value="black" style="--swatch:#2a2a28">Noir</button>
      </div>
    </div>

    <div class="filter-group">
      <label>Type</label>
      <div class="chips" id="filter-type">
        <button class="chip active" data-value="all">Tout</button>
        <button class="chip" data-value="superposition">Superposition</button>
        <button class="chip" data-value="crawl">Crawl</button>
        <button class="chip" data-value="cristal">Cristal</button>
        <button class="chip" data-value="craquelé">Craquelé</button>
        <button class="chip" data-value="métallique">Métallique</button>
        <button class="chip" data-value="granit">Granit</button>
        <button class="chip" data-value="effet">Effet</button>
      </div>
    </div>
  </div>

  <main>
    <div class="grid" id="glaze-grid"></div>
    <p class="empty-state" id="empty-state" hidden>Aucun émail ne correspond à votre recherche.</p>
  </main>

  <template id="card-template">
    <article class="card">
      <div class="card-swatch">
        <img class="card-img" alt="" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-header-row">
          <span class="card-ref"></span>
          <span class="card-brand-badge"></span>
        </div>
        <h2 class="card-name"></h2>
        <div class="card-tags">
          <span class="tag tag-temp"></span>
          <span class="tag tag-finish"></span>
          <span class="tag tag-form"></span>
        </div>
        <a class="card-link" target="_blank" rel="noopener">Voir le produit ↗</a>
      </div>
      <p class="card-notes"></p>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
